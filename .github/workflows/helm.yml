name: Release Helm Charts

on:
  push:
    tags: ['[0-9]+.[0-9]+.[0-9]+']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@v4
      - name: Package Helm chart
        run: |
          helm package charts/webrtc -d .helm-packages
      - name: Ensure gh-pages branch exists
        run: |
          if git ls-remote --exit-code --heads origin gh-pages; then
            echo "gh-pages branch already exists"
          else
            echo "gh-pages branch does not exist, creating it"
            CURRENT_HEAD=$(git rev-parse HEAD)
            git checkout --orphan gh-pages
            git reset --hard
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "Initial gh-pages commit"
            git push origin gh-pages || { echo "Failed to push gh-pages branch"; exit 1; }
            git checkout "$CURRENT_HEAD"
          fi
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
      - name: Update Helm repo index
        run: |
          cp .helm-packages/*.tgz gh-pages/
          helm repo index gh-pages --url https://dkrizic.github.io/webrtc --merge gh-pages/index.yaml || \
          helm repo index gh-pages --url https://dkrizic.github.io/webrtc
      - name: Push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update Helm chart repo" || echo "Nothing to commit"
          git push
