backend:
  image:
    repository: ghcr.io/dkrizic/webrtc-backend
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8080
  sip:
    port: 5060
  env:
    - name: SIP_SERVER
      value: ""
    - name: SIP_USERNAME
      value: ""
    - name: SIP_DOMAIN
      value: ""
    - name: LISTEN_ADDR
      value: ":8080"
    - name: LOG_LEVEL
      value: "info"
    - name: API_BASE_PATH
      value: "/api"
  envFrom: []
  resources: {}

frontend:
  image:
    repository: ghcr.io/dkrizic/webrtc-frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 3000
  env:
    LISTEN_ADDR: ":3000"
    LOG_LEVEL: "info"
  envFrom: []
  resources: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: webrtc.local
      paths:
        - path: /api
          pathType: Prefix
          service: backend
        - path: /ws
          pathType: Prefix
          service: backend
        - path: /
          pathType: Prefix
          service: frontend
  tls: []

udpRoute:
  enabled: false
  gatewayName: traefik
  gatewayNamespace: traefik
  sectionName: sip
