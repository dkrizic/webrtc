apiVersion: v1
kind: Service
metadata:
  name: {{ include "webrtc.backend.fullname" . }}
  labels:
    {{- include "webrtc.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.backend.sip.port }}
      targetPort: sip
      protocol: UDP
      name: sip
  selector:
    {{- include "webrtc.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
