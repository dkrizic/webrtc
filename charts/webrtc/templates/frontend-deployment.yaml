apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "webrtc.frontend.fullname" . }}
  labels:
    {{- include "webrtc.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "webrtc.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "webrtc.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.service.port }}
              protocol: TCP
          env:
            - name: BACKEND_URL
              value: "http://{{ include "webrtc.backend.fullname" . }}:{{ .Values.backend.service.port }}"
            - name: LISTEN_ADDR
              value: {{ .Values.frontend.env.LISTEN_ADDR | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.frontend.env.LOG_LEVEL | quote }}
          {{- with .Values.frontend.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.frontend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
