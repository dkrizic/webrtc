version: "3.9"
services:
  backend:
    build:
      context: ./backend
    environment:
      - SIP_SERVER=sip.clarity.example.com
      - SIP_USERNAME=agent1
      - SIP_PASSWORD=secret
      - SIP_DOMAIN=clarity.example.com
      - LISTEN_ADDR=:8080
      - LOG_LEVEL=debug
    ports:
      - "8080:8080"
    networks:
      - webrtc

  frontend:
    build:
      context: ./frontend
    environment:
      - BACKEND_URL=http://backend:8080
      - LISTEN_ADDR=:3000
    ports:
      - "80:3000"
    depends_on:
      - backend
    networks:
      - webrtc

networks:
  webrtc:
    driver: bridge
